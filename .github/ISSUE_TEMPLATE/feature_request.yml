name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you would like
      placeholder: "Add support for downloading files from authenticated URLs using bearer tokens."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe why this feature would be useful
      placeholder: |
        Many private file servers require authentication. Currently, users cannot 
        download files from protected URLs without manual workarounds. Adding 
        authentication support would make the tool more versatile for enterprise use.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: If you have ideas for how this could be implemented, describe them here
      placeholder: |
        Add an `--auth` flag that accepts a bearer token:
        
        ```
        gogetit download --auth "Bearer token123" https://protected.example.com/file.zip
        ```
        
        The token would be added to the Authorization header for all requests.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: "Currently I use curl with the -H flag for authenticated downloads, but having it integrated would be more convenient."

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here
